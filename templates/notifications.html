<!DOCTYPE html>

<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Notifications - CampusFind</title>
  <!-- Tailwind CSS v3 with Plugins -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <!-- Material Icons -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
</head>

<body class="bg-gray-50 text-gray-900 font-sans">
  <!-- BEGIN: MainHeader -->
  <header class="bg-white border-b border-gray-200 sticky top-0 z-50" data-purpose="site-navigation">
    <div class="max-w-3xl mx-auto px-4 py-4 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <span class="material-icons text-blue-600">campus</span>
        <h1 class="text-xl font-bold tracking-tight text-blue-700">CampusFind</h1>
      </div>
      <nav class="flex gap-4">
        <a class="text-gray-500 hover:text-blue-600 transition-colors" href="/student">
          <span class="material-icons">home</span>
        </a>
        <a class="text-blue-600" href="#">
          <span class="material-icons">notifications</span>
        </a>
      </nav>
    </div>
  </header>
  <!-- END: MainHeader -->
  <!-- BEGIN: NotificationsContent -->
  <main class="max-w-3xl mx-auto px-4 py-8">
    <!-- BEGIN: SectionTitle -->
    <section class="mb-6 flex items-center justify-between" data-purpose="page-heading">
      <div>
        <h2 class="text-2xl font-bold text-gray-800">Your Notifications</h2>
        <p class="text-sm text-gray-500">Stay updated on your lost and found items</p>
      </div>
      <button id="mark-all-read-btn" class="text-sm font-medium text-blue-600 hover:underline">Mark all as read</button>
    </section>
    <!-- END: SectionTitle -->
    <div id="notifications-container" class="space-y-3" data-purpose="notification-feed">
      <div class="text-center py-10 text-gray-500">
        No notifications yet.
      </div>
    </div>
    <!-- END: NotificationsList -->
    <!-- BEGIN: LoadMore -->
    <div class="mt-8 text-center" data-purpose="pagination-ui">
      <button id="view-past-notifications-btn"
        class="px-6 py-2 border border-gray-300 rounded-full text-sm font-medium text-gray-600 hover:bg-gray-50 transition-colors">
        View Past Notifications
      </button>
    </div>
    <!-- END: LoadMore -->
  </main>
  <!-- END: NotificationsContent -->
  <!-- BEGIN: Footer -->
  <footer class="mt-12 py-8 border-t border-gray-200 text-center text-gray-400 text-xs">
    <p>© 2023 CampusFind. University Lost &amp; Found Service.</p>
  </footer>
  <!-- END: Footer -->
  <!-- END: Footer -->

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const markReadBtn = document.getElementById('mark-all-read-btn');
      const viewPastBtn = document.getElementById('view-past-notifications-btn');

      if (markReadBtn) {
        markReadBtn.addEventListener('click', function () {
          // Find all unread notifications
          const unreadNotifications = document.querySelectorAll('div[data-purpose="unread-notification"]');

          unreadNotifications.forEach(notification => {
            // Change background
            notification.classList.remove('bg-blue-50', 'border-l-4', 'border-blue-600');
            notification.classList.add('bg-white', 'border', 'border-gray-200');

            // Change icon background
            const iconBg = notification.querySelector('.bg-blue-100');
            if (iconBg) {
              iconBg.classList.remove('bg-blue-100');
              iconBg.classList.add('bg-gray-100');

              const icon = iconBg.querySelector('.material-icons');
              if (icon) {
                icon.classList.remove('text-blue-600');
                icon.classList.add('text-gray-400');
              }
            }

            // Remove the blue dot
            const unreadDot = notification.querySelector('.bg-blue-600.rounded-full.mt-2');
            if (unreadDot) {
              unreadDot.remove();
            }

            // Change to read status
            notification.setAttribute('data-purpose', 'read-notification');
          });

          // Hide button after clicking
          markReadBtn.style.display = 'none';
        });
      }

      if (viewPastBtn) {
        viewPastBtn.addEventListener('click', function () {
          const pastNotifications = document.querySelectorAll('.past-notification');

          pastNotifications.forEach(notification => {
            notification.classList.remove('hidden');
            notification.classList.add('flex');
          });

          // Hide button after showing items
          viewPastBtn.style.display = 'none';
        });
      }
    });
  </script>
</body>

</html>
