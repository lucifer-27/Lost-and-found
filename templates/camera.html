<!-- CampusFind Image Capture Module
     Implements client-side camera access, image rendering via canvas,
     and secure upload functionality to support item reporting workflows. -->

{% extends "base.html" %}
{% block content %}
<style>
    .camera-stage {
        width: 100%;
        display: flex;
        justify-content: center;
    }

    .camera-media {
        display: block;
        width: auto;
        max-width: 100%;
        height: auto;
        max-height: 70vh;
        border-radius: 0.5rem;
        background: #111827;
    }

    #canvas {
        display: none;
    }

    #canvas.has-preview {
        display: block;
    }
</style>
<div class="container d-flex justify-content-center">
    <div class="card shadow-sm p-4 text-center" style="max-width:500px; width:100%; border-radius:12px;">

        <h3 class="mb-3">Capture Item Photo</h3>
        <p class="text-muted mb-4">Use your camera to take a clear picture of the item.</p>

        <!-- Camera -->
        <div class="camera-stage">
            <video id="video" autoplay playsinline class="border camera-media"></video>
        </div>

        <!-- Buttons -->
        <div class="mt-4 d-flex justify-content-center gap-3">

            <button type="button" class="btn btn-primary px-4" onclick="capture()">
                📸 Capture
            </button>

        </div>

        <!-- Canvas Preview -->
        <div class="camera-stage mt-4">
            <canvas id="canvas" class="border camera-media"></canvas>
        </div>

        <!-- Upload -->
        <form method="POST" action="{{ url_for('general.upload', next=return_url) }}" class="mt-4">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="hidden" name="image" id="image_data">

            <button type="submit" class="btn btn-success px-4">
                Upload Image
            </button>
        </form>

    </div>
</div>

<script>

    const video = document.getElementById("video")
    const canvas = document.getElementById("canvas")
    const context = canvas.getContext("2d")
    const MAX_CAPTURE_DIMENSION = 1600
    const CAPTURE_QUALITY = 0.82

    navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: "environment" } }
    })
        .then(stream => {
            video.srcObject = stream
        })
        .catch(err => {
            alert("Camera access denied")
        })

    video.addEventListener("loadedmetadata", function () {
        if (!video.videoWidth || !video.videoHeight) {
            return
        }

        canvas.width = video.videoWidth
        canvas.height = video.videoHeight
    })

    function capture() {
        const sourceWidth = video.videoWidth || 400
        const sourceHeight = video.videoHeight || 300
        const longestSide = Math.max(sourceWidth, sourceHeight)
        const scale = longestSide > MAX_CAPTURE_DIMENSION ? MAX_CAPTURE_DIMENSION / longestSide : 1
        const frameWidth = Math.round(sourceWidth * scale)
        const frameHeight = Math.round(sourceHeight * scale)

        canvas.width = frameWidth
        canvas.height = frameHeight
        context.drawImage(video, 0, 0, frameWidth, frameHeight)
        canvas.classList.add("has-preview")

        const image = canvas.toDataURL("image/jpeg", CAPTURE_QUALITY)

        document.getElementById("image_data").value = image
    }

</script>

{% endblock %}
