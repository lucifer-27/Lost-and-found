<!-- CampusFind Image Capture Module
     Implements client-side camera access, image rendering via canvas,
     and secure upload functionality to support item reporting workflows. -->

{% extends "base.html" %}
{% block content %}
<div class="container d-flex justify-content-center">
    <div class="card shadow-sm p-4 text-center" style="max-width:500px; width:100%; border-radius:12px;">

        <h3 class="mb-3">Capture Item Photo</h3>
        <p class="text-muted mb-4">Use your camera to take a clear picture of the item.</p>

        <!-- Camera -->
        <div class="d-flex justify-content-center">
            <video id="video" autoplay class="border rounded" width="400" height="300"></video>
        </div>

        <!-- Buttons -->
        <div class="mt-4 d-flex justify-content-center gap-3">

            <button type="button" class="btn btn-primary px-4" onclick="capture()">
                📸 Capture
            </button>

        </div>

        <!-- Canvas Preview -->
        <div class="mt-4">
            <canvas id="canvas" width="400" height="300" class="border rounded"></canvas>
        </div>

        <!-- Upload -->
        <form method="POST" action="{{ url_for('general.upload', next=return_url) }}" class="mt-4">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="hidden" name="image" id="image_data">

            <button type="submit" class="btn btn-success px-4">
                Upload Image
            </button>
        </form>

    </div>
</div>

<script>

    const video = document.getElementById("video")

    navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: "environment" } }
    })
        .then(stream => {
            video.srcObject = stream
        })
        .catch(err => {
            alert("Camera access denied")
        })

    function capture() {

        const canvas = document.getElementById("canvas")
        const context = canvas.getContext("2d")

        context.drawImage(video, 0, 0, 400, 300)

        const image = canvas.toDataURL("image/png")

        document.getElementById("image_data").value = image
    }

</script>

{% endblock %}
