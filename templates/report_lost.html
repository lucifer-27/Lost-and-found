<!-- CampusFind Lost Item Reporting & Tracking Module
     Implements user-driven data input with validation and categorization,
     enabling efficient tracking and matching of lost items within the system. -->

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Report Lost Item - CampusFind</title>

  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />

  <style>
    .focus-ring-blue:focus {
      --tw-ring-color: #2563eb;
      border-color: #2563eb;
    }

    /* Custom animated dropdown */
    .custom-dropdown-options {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1),
        opacity 0.25s ease,
        transform 0.25s ease;
      opacity: 0;
      transform: translateY(-6px);
    }

    .custom-dropdown-options.open {
      max-height: 400px;
      opacity: 1;
      transform: translateY(0);
    }

    .dropdown-chevron {
      transition: transform 0.3s ease;
    }

    .dropdown-chevron.open {
      transform: rotate(180deg);
    }

    .dropdown-option:hover {
      background-color: #eff6ff;
      color: #2563eb;
    }

    .dropdown-option.selected {
      background-color: #dbeafe;
      color: #1d4ed8;
      font-weight: 600;
    }
  </style>
</head>

<body class="bg-gray-50 min-h-screen flex flex-col font-sans">

  <nav class="bg-white border-b border-gray-100 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">

        <div class="flex items-center">
          <span class="text-2xl font-bold text-blue-600 flex items-center">
            <span class="material-icons mr-2">search</span>
            CampusFind
          </span>
        </div>
      </div>
    </div>
  </nav>

  <main class="max-w-3xl mx-auto px-4 py-8 w-full">

    <section class="mb-8 flex items-center justify-between">
      <div class="flex items-center">
        <a href="/student"
          class="mr-4 w-10 h-10 bg-white border border-gray-200 rounded-full flex items-center justify-center text-gray-600 hover:text-blue-600 hover:border-blue-200 hover:bg-blue-50 transition-colors shadow-sm"
          title="Back to Dashboard">
          <span class="material-icons">arrow_back</span>
        </a>
        <div>
          <h2 class="text-2xl font-bold text-gray-800">Report a Lost Item</h2>
          <p class="text-sm text-gray-500">Provide as much detail as possible to help us find it.</p>
        </div>
      </div>
    </section>

    <section class="bg-white shadow-lg rounded-xl w-full overflow-hidden border border-gray-100">

      <form action="/report-lost" method="POST" enctype="multipart/form-data" class="p-6 md:p-8 space-y-6">

        {% if error %}
        <div class="rounded-md border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
          {{ error }}
        </div>
        {% endif %}

        <div class="space-y-1">
          <label class="block text-sm font-semibold text-gray-700">Item Name</label>
          <input class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 py-2 px-3"
            name="item_name" required type="text" />
        </div>

        <div class="space-y-1">
          <label class="block text-sm font-semibold text-gray-700">Category</label>
          <!-- Hidden input that actually submits the value -->
          <input type="hidden" name="category" id="category-input" required />

          <!-- Custom dropdown trigger -->
          <div class="relative" id="category-dropdown">
            <button type="button" id="category-btn" onclick="toggleDropdown()"
              class="w-full flex items-center justify-between rounded-md border border-gray-300 shadow-sm bg-white py-2 px-3 text-left text-gray-500 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500 transition-colors">
              <span id="category-label">Select a category</span>
              <svg class="dropdown-chevron w-4 h-4 text-gray-400" id="chevron" xmlns="http://www.w3.org/2000/svg"
                fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
              </svg>
            </button>

            <!-- Animated options panel -->
            <div id="category-options"
              class="custom-dropdown-options absolute z-20 w-full mt-1 bg-white border border-gray-200 rounded-md shadow-lg">
              <ul class="py-1">
                {% for cat in categories %}
                <li class="dropdown-option cursor-pointer px-4 py-2.5 text-sm text-gray-700 transition-colors"
                  onclick='selectOption({{ cat|tojson }}, {{ cat|tojson }}, this)'>
                  {{ cat }}
                </li>
                {% endfor %}
              </ul>
            </div>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

          <div class="space-y-1">
            <label class="block text-sm font-semibold text-gray-700">Date Lost</label>
            <input
              class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 py-2 px-3"
              max="{{ today }}" name="date_lost" required type="date" />
          </div>

          <div class="space-y-1">
            <label class="block text-sm font-semibold text-gray-700">Last Known Location</label>
            <input
              class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 py-2 px-3"
              name="location" required type="text" />
          </div>

        </div>

        <div class="space-y-1">
          <label class="block text-sm font-semibold text-gray-700">Description</label>
          <textarea
            class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 py-2 px-3"
            name="description" required rows="4"></textarea>
        </div>

        <div class="space-y-1">
          <label class="block text-sm font-semibold text-gray-700">Upload Image (Optional)</label>
          <label class="block text-sm font-semibold text-gray-400">Upload similiar image of lost item for
            reference.</label>
          <input type="file" name="image" accept="image/*" class="w-full border border-gray-300 rounded-md p-2" />
        </div>

        <div class="pt-4">
          <button
            class="w-full py-3 px-4 rounded-md shadow-sm text-lg font-bold text-white bg-blue-600 hover:bg-blue-700"
            type="submit">
            Submit Report
          </button>
        </div>

      </form>

    </section>
  </main>

  <script>
    const optionsEl = document.getElementById('category-options');
    const chevronEl = document.getElementById('chevron');
    const inputEl = document.getElementById('category-input');
    const labelEl = document.getElementById('category-label');

    function toggleDropdown() {
      const isOpen = optionsEl.classList.toggle('open');
      chevronEl.classList.toggle('open', isOpen);
    }

    function selectOption(value, text, el) {
      inputEl.value = value;
      labelEl.textContent = text;
      labelEl.classList.remove('text-gray-500');
      labelEl.classList.add('text-gray-900');

      // Mark selected visually
      document.querySelectorAll('.dropdown-option').forEach(e => e.classList.remove('selected'));
      if (el) el.classList.add('selected');

      // Close dropdown
      optionsEl.classList.remove('open');
      chevronEl.classList.remove('open');
    }

    // Close if clicking outside
    document.addEventListener('click', function (e) {
      const dropdown = document.getElementById('category-dropdown');
      if (!dropdown.contains(e.target)) {
        optionsEl.classList.remove('open');
        chevronEl.classList.remove('open');
      }
    });
  </script>

  <footer class="bg-gray-100 py-6 px-6 text-center text-gray-500 text-sm border-t border-gray-200">
    <div class="text-center text-xs">
      © 2026 CampusFind PDEU. All rights reserved.
    </div>
  </footer>

    <script src="{{ url_for('static', filename='js/chatbot-widget.js') }}"></script>
</body>

</html>
