<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Report Lost Item - CampusFind</title>

  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />

  <style>
    .focus-ring-blue:focus {
      --tw-ring-color: #2563eb;
      border-color: #2563eb;
    }
  </style>
</head>

<body class="bg-gray-50 min-h-screen flex flex-col font-sans">

  <nav class="bg-white border-b border-gray-100 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">

        <div class="flex items-center">
          <span class="text-2xl font-bold text-blue-600 flex items-center">
            <span class="material-icons mr-2">search</span>
            CampusFind
          </span>
        </div>
      </div>
    </div>
  </nav>

  <main class="max-w-3xl mx-auto px-4 py-8 w-full">

    <section class="mb-8 flex items-center justify-between">
      <div class="flex items-center">
        <a href="/student"
          class="mr-4 w-10 h-10 bg-white border border-gray-200 rounded-full flex items-center justify-center text-gray-600 hover:text-blue-600 hover:border-blue-200 hover:bg-blue-50 transition-colors shadow-sm"
          title="Back to Dashboard">
          <span class="material-icons">arrow_back</span>
        </a>
        <div>
          <h2 class="text-2xl font-bold text-gray-800">Report a Lost Item</h2>
          <p class="text-sm text-gray-500">Provide as much detail as possible to help us find it.</p>
        </div>
      </div>
    </section>

    <section class="bg-white shadow-lg rounded-xl w-full overflow-hidden border border-gray-100">

      <form action="/report-lost" method="POST" enctype="multipart/form-data" class="p-6 md:p-8 space-y-6">

        <div class="space-y-1">
          <label class="block text-sm font-semibold text-gray-700">Item Name</label>
          <input class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 py-2 px-3"
            name="item_name" required type="text" />
        </div>

        <div class="space-y-1">
          <label class="block text-sm font-semibold text-gray-700">Category</label>
          <select
            class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 py-2 px-3"
            name="category" required>
            <option disabled selected value="">Select a category</option>
            <option value="electronics">Electronics</option>
            <option value="documents">Documents</option>
            <option value="accessories">Accessories</option>
            <option value="others">Others</option>
          </select>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

          <div class="space-y-1">
            <label class="block text-sm font-semibold text-gray-700">Date Lost</label>
            <input
              class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 py-2 px-3"
              name="date_lost" required type="date" />
          </div>

          <div class="space-y-1">
            <label class="block text-sm font-semibold text-gray-700">Last Known Location</label>
            <input
              class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 py-2 px-3"
              name="location" required type="text" />
          </div>

        </div>

        <div class="space-y-1">
          <label class="block text-sm font-semibold text-gray-700">Description</label>
          <textarea
            class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 py-2 px-3"
            name="description" required rows="4"></textarea>
        </div>

        <div class="space-y-1">
          <label class="block text-sm font-semibold text-gray-700">Upload Image (Optional)</label>
          <label class="block text-sm font-semibold text-gray-400">Upload similiar image of lost item for
            reference.</label>
          <input type="file" name="image" accept="image/*" class="w-full border border-gray-300 rounded-md p-2" />
        </div>

        <div class="pt-4">
          <button
            class="w-full py-3 px-4 rounded-md shadow-sm text-lg font-bold text-white bg-blue-600 hover:bg-blue-700"
            type="submit">
            Submit Report
          </button>
        </div>

      </form>

    </section>
  </main>

  <footer class="bg-gray-100 py-6 px-6 text-center text-gray-500 text-sm border-t border-gray-200">
    <div class="text-center text-xs">
      © 2026 CampusFind PDEU. All rights reserved.
    </div>
  </footer>

</body>

</html>
