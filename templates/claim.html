<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Verify & Return Item - CampusFind Security</title>

  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          borderRadius: { 'card': '12px' },
          colors: {
            campus: {
              primary: '#2563eb',
              secondary: '#64748b',
              accent: '#f8fafc'
            }
          }
        }
      }
    }
  </script>

  <style>
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-color: #f8fafc;
    }

    .material-icons {
      vertical-align: middle;
    }

    .form-container {
      max-width: 800px;
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <nav class="bg-white border-b border-gray-100 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">

        <div class="flex items-center">
          <span class="text-2xl font-bold text-blue-600 flex items-center">
            <span class="material-icons mr-2">search</span>
            CampusFind
          </span>
        </div>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="form-container mx-auto bg-white rounded-card shadow-sm border border-gray-100 overflow-hidden">
      <div class="p-6 border-b border-gray-100 bg-gray-50 flex items-center">
        <div>
          <a href="/items"
            class="mr-4 w-10 h-10 bg-white border border-gray-200 rounded-full flex items-center justify-center text-gray-600 hover:text-blue-600 hover:border-blue-200 hover:bg-blue-50 transition-colors shadow-sm"
            title="Back to Items">
            <span class="material-icons">arrow_back</span>
          </a>
        </div>
        <div>
          <h2 class="text-xl font-bold text-gray-800">Process Item Return</h2>
          <p class="text-gray-500 text-sm mt-1">Security staff must physically verify the student before handing over
            the item.</p>
        </div>
      </div>

      <form action="/claim" method="POST" class="p-6 space-y-6">

        <!-- ITEM NAME -->
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">Item Name</label>
          <input type="text" name="item_name" required placeholder="Enter the item name" {% if selected_item_name
            %}value="{{ selected_item_name }}" {% endif %}
            class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
          <input type="hidden" name="item_id" value="{{ selected_item_id or '' }}">
        </div>

        <!-- STUDENT INFO -->
        <div class="grid md:grid-cols-2 gap-6">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">Student Name</label>
            <input type="text" name="student_name" required
              class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
          </div>

          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">Roll Number</label>
            <input type="text" name="roll_no" required
              class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
          </div>
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">Student Email</label>
          <input type="email" name="student_email" required pattern="[a-zA-Z0-9]+@[a-zA-Z0-9]+\.pdpu\.ac\.in"
            placeholder="24bcp001@sot.pdpu.ac.in"
            class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
        </div>

        <!-- VERIFICATION PROOF -->
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">Proof Description</label>
          <textarea name="proof" rows="3" required
            class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500"></textarea>
        </div>

        <!-- RETURN TIME -->
        <div class="grid md:grid-cols-2 gap-6">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">Return Date</label>
            <input type="date" name="return_date" required
              class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
          </div>

          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">Return Time</label>
            <input type="time" name="return_time" required
              class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
          </div>
        </div>

        <!-- CONFIRMATION -->
        <div class="flex items-start gap-3 bg-amber-50 border border-amber-200 rounded-lg p-4">
          <input type="checkbox" required class="mt-1 border-gray-300 text-amber-600 focus:ring-amber-500 rounded">
          <p class="text-sm font-medium text-amber-800">
            I confirm that I have physically verified the student identity and ownership proof before returning the
            item.
          </p>
        </div>

        <!-- BUTTONS -->
        <div class="pt-6 border-t border-gray-100 flex flex-col sm:flex-row gap-4 sm:justify-end">
          <a href="/items"
            class="px-6 py-2.5 rounded-lg border border-gray-300 text-gray-700 font-semibold hover:bg-gray-50 text-center transition-colors">
            Cancel
          </a>

          <button
            class="px-8 py-2.5 rounded-lg bg-blue-600 text-white font-semibold hover:bg-blue-700 shadow-sm transition-colors flex items-center justify-center space-x-2"
            type="submit">
            <span class="material-icons text-sm">verified_user</span>
            <span>Mark Item Returned</span>
          </button>
        </div>

      </form>
    </div>
  </main>

  <footer class="mt-12 py-8 bg-white border-t border-gray-100">
    <div class="max-w-7xl mx-auto px-4 text-center">
      <div class="text-center text-xs text-gray-500">
        © 2026 CampusFind PDEU. All rights reserved.
      </div>
    </div>
  </footer>

</body>

</html>
