<!-- CampusFind Global Layout
     Shared shell for inherited pages, styled to match the dashboard templates while
     keeping shared text labels and link positions stable. -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>{% block title %}CampusFind{% endblock %}</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />

    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #f8fafc;
        }

        .hover-lift {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .hover-lift:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 113, 227, 0.3);
        }

        .material-icons {
            vertical-align: middle;
        }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb',
                        brandGray: '#f8fafc',
                        brandBlue: '#2563eb',
                    },
                    borderRadius: {
                        card: '12px',
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block extra_head %}{% endblock %}
</head>

<body class="bg-brandGray min-h-screen text-slate-900 flex flex-col">

    <header class="bg-white border-b border-gray-100 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="h-16 flex items-center justify-between">
                <a class="flex items-center gap-2 no-underline" href="{{ url_for('general.home') }}">
                    <span class="material-icons text-[30px] text-blue-600">search</span>
                    <span class="text-2xl font-bold tracking-tight text-blue-600">CampusFind</span>
                </a>

                <div class="flex items-center gap-3 text-sm font-medium">
                    <a class="text-gray-600 hover:text-blue-600 no-underline transition-colors" href="{{ url_for('general.home') }}">
                        Home
                    </a>
                    {% if session.get('user') %}
                    <a class="bg-gray-50 hover:bg-gray-100 text-gray-700 px-4 py-2 rounded-full border border-gray-200 no-underline transition-colors shadow-sm"
                        href="{%- if session.get('role') == 'student' -%}/student{%- elif session.get('role') == 'staff' -%}/staff{%- elif session.get('role') == 'admin' -%}/admin{%- else -%}/login{%- endif -%}">
                        Dashboard
                    </a>
                    {% else %}
                    <a class="bg-gray-50 hover:bg-gray-100 text-gray-700 px-4 py-2 rounded-full border border-gray-200 no-underline transition-colors shadow-sm"
                        href="{{ url_for('auth.login') }}">
                        Login
                    </a>
                    {% endif %}
                </div>
            </div>
        </div>
    </header>

    <main class="flex-1 w-full py-8">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            {% block content %}
            {% endblock %}
        </div>
    </main>

    <footer class="mt-12 py-8 bg-white border-t border-gray-100">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <div class="text-center text-xs text-gray-500">
                © 2026 CampusFind PDEU. All rights reserved.
            </div>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/chatbot-widget.js') }}"></script>
    {% block extra_scripts %}{% endblock %}
</body>

</html>
