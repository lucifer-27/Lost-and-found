<!-- CampusFind Global Layout (Base Template)
     Establishes a unified structure for all pages by integrating common UI elements,
     styles, and scripts while supporting dynamic content rendering using template inheritance. -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>CampusFind - Lost & Found</title>

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>


    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">

            <a class="navbar-brand" href="{{ url_for('home') }}">
                CampusFind
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">

            </div>
        </div>
    </nav>


    <!-- MAIN CONTENT -->
    <div class="container mt-4">

        {% block content %}
        {% endblock %}

    </div>


    <!-- FOOTER -->
    <footer class="bg-white text-dark text-center mt-5 p-3">
        <footer class="mt-12 py-8 bg-white border-t border-gray-100">
            <div class="max-w-7xl mx-auto px-4 text-center">
                <div class="text-center text-xs text-gray-500">
                    © 2026 CampusFind PDEU. All rights reserved.
                </div>
            </div>
        </footer>
    </footer>


    <!-- JS -->
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script src="{{ url_for('static', filename='js/chatbot-widget.js') }}"></script>
</body>

</html>
