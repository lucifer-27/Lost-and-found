{% extends "base.html" %}

{% block content %}

<div class="container d-flex justify-content-center mt-5">
    <div class="card p-4 shadow-sm text-center" style="max-width:400px; width:100%;">

        <h3 class="mb-3">Forgot Password</h3>
        <p class="text-muted">Enter your registered email</p>

        <form method="POST" action="{{ url_for('auth.forgot_password') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">


            <input type="email" name="email" class="form-control mb-3" placeholder="Enter email" required>

            <button type="submit" class="btn btn-primary w-100">
                Send OTP
            </button>

        </form>

        {% if error %}
            <p class="text-danger mt-3">{{ error }}</p>
        {% endif %}

    </div>
</div>

{% endblock %}
